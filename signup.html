<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Pamtech Automobile</title>
    <meta name="description" content="Create your Pamtech Automobile account.">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-car"></i>
                </div>
                <span class="logo-text">Pam<span>tech</span></span>
            </a>
            
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Signup Page -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <div class="logo-icon">
                        <i class="fas fa-car"></i>
                    </div>
                    <span class="logo-text">Pam<span>tech</span></span>
                </a>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Join Pamtech and enjoy premium services</p>
            </div>
            
            <form id="signup-form">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-user" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="text" id="name" class="form-input" style="border: none; flex: 1;" placeholder="Enter your full name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-envelope" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="email" id="email" class="form-input" style="border: none; flex: 1;" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-phone" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="tel" id="phone" class="form-input" style="border: none; flex: 1;" placeholder="08012345678" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-lock" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="password" id="password" class="form-input" style="border: none; flex: 1;" placeholder="Create a password" required minlength="6">
                        <button type="button" id="toggle-password" style="background: none; border: none; color: var(--text-muted); padding: 0 18px; cursor: pointer;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-lock" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="password" id="confirm-password" class="form-input" style="border: none; flex: 1;" placeholder="Confirm your password" required>
                    </div>
                </div>
                
                <div style="margin-bottom: 24px;">
                    <label style="display: flex; align-items: flex-start; gap: 8px; cursor: pointer; color: var(--text-muted); font-size: 0.875rem;">
                        <input type="checkbox" id="terms" required style="width: 16px; height: 16px; margin-top: 2px;">
                        <span>I agree to the <a href="#" style="color: var(--primary-gold);">Terms of Service</a> and <a href="#" style="color: var(--primary-gold);">Privacy Policy</a></span>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
            </div>
        </div>
    </div>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
    
    <!-- Signup Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            if (Pamtech.Auth.isLoggedIn()) {
                window.location.href = 'dashboard.html';
                return;
            }
            
            // Toggle password visibility
            const togglePassword = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // Signup form
            const signupForm = document.getElementById('signup-form');
            signupForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const phone = document.getElementById('phone').value;
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                // Validation
                if (password !== confirmPassword) {
                    Pamtech.showNotification('Passwords do not match', 'error');
                    return;
                }
                
                if (!Pamtech.Utils.isValidEmail(email)) {
                    Pamtech.showNotification('Please enter a valid email address', 'error');
                    return;
                }
                
                if (!Pamtech.Utils.isValidPhone(phone)) {
                    Pamtech.showNotification('Please enter a valid phone number (11 digits)', 'error');
                    return;
                }
                
                const result = Pamtech.Auth.signup(name, email, phone, password);
                
                if (result.success) {
                    Pamtech.showNotification(result.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    Pamtech.showNotification(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
