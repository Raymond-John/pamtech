<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate - Pamtech Automobile</title>
    <meta name="description" content="Discover premium properties in prime locations at Pamtech Real Estate.">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-car"></i>
                </div>
                <span class="logo-text">Pam<span>tech</span></span>
            </a>
            
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="fuel.html" class="nav-link">Oil & Gas</a></li>
                <li><a href="cars.html" class="nav-link">Autoland</a></li>
                <li><a href="autoparts.html" class="nav-link">Autoparts</a></li>
                <li><a href="luxury-rides.html" class="nav-link">Luxury Ride</a></li>
                <li><a href="properties.html" class="nav-link active">Real Estate</a></li>
            </ul>
            
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
                <a href="login.html" class="btn btn-primary btn-sm auth-link">
                    <i class="fas fa-user"></i> Login
                </a>
            </div>
        </div>
    </nav>

    <!-- Properties Page -->
    <div class="dashboard-page">
        <div class="dashboard-header">
            <div class="container">
                <h1><i class="fas fa-building"></i> Real Estate</h1>
                <p>Discover premium properties in prime locations</p>
            </div>
        </div>
        
        <div class="container">
            <!-- Search and Filter -->
            <div class="products-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search properties...">
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <select id="type-filter" class="filter-select">
                        <option value="all">All Types</option>
                        <option value="Duplex">Duplex</option>
                        <option value="Apartment">Apartment</option>
                        <option value="Terrace">Terrace</option>
                        <option value="Bungalow">Bungalow</option>
                        <option value="Commercial">Commercial</option>
                    </select>
                    <select id="price-filter" class="filter-select">
                        <option value="">All Prices</option>
                        <option value="0-100000000">Under ₦100M</option>
                        <option value="100000000-300000000">₦100M - ₦300M</option>
                        <option value="300000000+">Above ₦300M</option>
                    </select>
                </div>
            </div>
            
            <!-- Properties Grid -->
            <div class="products-grid" id="properties-grid">
                <!-- Properties will be loaded dynamically -->
            </div>
            
            <!-- No Results -->
            <div id="no-results" style="display: none; text-align: center; padding: 60px 20px;">
                <i class="fas fa-building" style="font-size: 4rem; color: var(--primary-gold); opacity: 0.5; margin-bottom: 20px;"></i>
                <h3>No properties found</h3>
                <p style="color: var(--text-muted);">Try adjusting your search or filter</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Pamtech Automobile. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
    
    <!-- Properties Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProperties();
            
            // Search functionality
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', Pamtech.Utils.debounce(() => {
                loadProperties();
            }, 300));
            
            // Filter handlers
            document.getElementById('type-filter').addEventListener('change', loadProperties);
            document.getElementById('price-filter').addEventListener('change', loadProperties);
        });
        
        function loadProperties() {
            const searchQuery = document.getElementById('search-input').value;
            const typeFilter = document.getElementById('type-filter').value;
            const priceFilter = document.getElementById('price-filter').value;
            
            let properties = Pamtech.Properties.getAll();
            
            // Apply search
            if (searchQuery) {
                properties = properties.filter(p => 
                    p.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.location.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }
            
            // Apply type filter
            if (typeFilter && typeFilter !== 'all') {
                properties = properties.filter(p => p.type === typeFilter);
            }
            
            // Apply price filter
            if (priceFilter) {
                if (priceFilter === '0-100000000') {
                    properties = properties.filter(p => p.price < 100000000);
                } else if (priceFilter === '100000000-300000000') {
                    properties = properties.filter(p => p.price >= 100000000 && p.price <= 300000000);
                } else if (priceFilter === '300000000+') {
                    properties = properties.filter(p => p.price > 300000000);
                }
            }
            
            const propertiesGrid = document.getElementById('properties-grid');
            const noResults = document.getElementById('no-results');
            
            if (properties.length === 0) {
                propertiesGrid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            propertiesGrid.innerHTML = properties.map(property => `
                <div class="product-card">
                    <img src="${property.image}" alt="${property.title}" class="product-image" style="height: 220px;">
                    <div class="product-info">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px;">
                            <h3 class="product-name">${property.title}</h3>
                            <span class="badge badge-gold">${property.type}</span>
                        </div>
                        <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 12px;">
                            <i class="fas fa-map-marker-alt"></i> ${property.location}
                        </p>
                        <div style="display: flex; gap: 15px; margin-bottom: 12px; font-size: 0.875rem; color: var(--text-muted);">
                            ${property.bedrooms > 0 ? `<span><i class="fas fa-bed"></i> ${property.bedrooms}</span>` : ''}
                            <span><i class="fas fa-bath"></i> ${property.bathrooms}</span>
                            <span><i class="fas fa-ruler-combined"></i> ${property.area}</span>
                        </div>
                        <div class="product-price">${Pamtech.Utils.formatCurrency(property.price)}</div>
                        <div class="product-actions">
                            <a href="property-details.html?id=${property.id}" class="btn btn-primary btn-sm" style="flex: 1;">
                                <i class="fas fa-eye"></i> View Details
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
