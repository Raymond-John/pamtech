<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media - Pamtech Automobile</title>
    <meta name="description" content="Stay updated with the latest news, automotive tips, and company updates from Pamtech Media.">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-car"></i>
                </div>
                <span class="logo-text">Pam<span>tech</span></span>
            </a>
            
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="fuel.html" class="nav-link">Oil & Gas</a></li>
                <li><a href="cars.html" class="nav-link">Autoland</a></li>
                <li><a href="autoparts.html" class="nav-link">Autoparts</a></li>
                <li><a href="luxury-rides.html" class="nav-link">Luxury Ride</a></li>
                <li><a href="properties.html" class="nav-link">Real Estate</a></li>
                <li><a href="media.html" class="nav-link active">Media</a></li>
            </ul>
            
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
                <a href="login.html" class="btn btn-primary btn-sm auth-link">
                    <i class="fas fa-user"></i> Login
                </a>
            </div>
        </div>
    </nav>

    <!-- Media Page -->
    <div class="dashboard-page">
        <div class="dashboard-header">
            <div class="container">
                <h1><i class="fas fa-newspaper"></i> Media Center</h1>
                <p>Stay updated with the latest news, automotive tips, and company updates</p>
            </div>
        </div>
        
        <div class="container">
            <!-- Featured Post -->
            <div id="featured-post" style="margin-bottom: 60px;">
                <!-- Featured post will be loaded dynamically -->
            </div>
            
            <!-- Blog Grid -->
            <h2 style="margin-bottom: 30px;">Latest News</h2>
            <div class="blog-grid" id="blog-grid">
                <!-- Blog posts will be loaded dynamically -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Pamtech Automobile. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
    
    <!-- Media Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadBlogPosts();
        });
        
        function loadBlogPosts() {
            const posts = Pamtech.Storage.get('blogPosts') || [];
            
            if (posts.length === 0) {
                document.getElementById('blog-grid').innerHTML = '<p style="color: var(--text-muted); text-align: center;">No posts available</p>';
                return;
            }
            
            // Sort by date (newest first)
            posts.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            // Featured post (first one)
            const featuredPost = posts[0];
            const featuredContainer = document.getElementById('featured-post');
            
            featuredContainer.innerHTML = `
                <div style="background: var(--bg-card); border-radius: var(--radius-xl); overflow: hidden;">
                    <div class="grid grid-2" style="gap: 0;">
                        <div style="height: 100%;">
                            <img src="${featuredPost.image}" alt="${featuredPost.title}" style="width: 100%; height: 100%; object-fit: cover; min-height: 350px;">
                        </div>
                        <div style="padding: 40px; display: flex; flex-direction: column; justify-content: center;">
                            <span class="badge badge-gold" style="width: fit-content; margin-bottom: 16px;">${featuredPost.category}</span>
                            <h2 style="margin-bottom: 16px; font-size: 2rem;">${featuredPost.title}</h2>
                            <div class="blog-meta" style="margin-bottom: 16px;">
                                <span><i class="fas fa-calendar"></i> ${Pamtech.Utils.formatDate(featuredPost.date)}</span>
                                <span><i class="fas fa-user"></i> Pamtech Team</span>
                            </div>
                            <p style="color: var(--text-muted); line-height: 1.8; margin-bottom: 24px;">${featuredPost.excerpt}</p>
                            <a href="#" class="btn btn-primary" style="width: fit-content;">
                                Read More <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            // Other posts
            const otherPosts = posts.slice(1);
            const blogGrid = document.getElementById('blog-grid');
            
            blogGrid.innerHTML = otherPosts.map(post => `
                <div class="blog-card">
                    <img src="${post.image}" alt="${post.title}" class="blog-image">
                    <div class="blog-content">
                        <div class="blog-meta">
                            <span><i class="fas fa-calendar"></i> ${Pamtech.Utils.formatDate(post.date)}</span>
                            <span class="badge badge-gold">${post.category}</span>
                        </div>
                        <h3 class="blog-title">${post.title}</h3>
                        <p class="blog-excerpt">${post.excerpt}</p>
                        <a href="#" class="blog-link">
                            Read More <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
