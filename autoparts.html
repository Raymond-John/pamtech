<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoparts - Pamtech Automobile</title>
    <meta name="description" content="Quality engine parts and accessories for all vehicle makes at Pamtech Autoparts.">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-car"></i>
                </div>
                <span class="logo-text">Pam<span>tech</span></span>
            </a>
            
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="fuel.html" class="nav-link">Oil & Gas</a></li>
                <li><a href="cars.html" class="nav-link">Autoland</a></li>
                <li><a href="autoparts.html" class="nav-link active">Autoparts</a></li>
                <li><a href="luxury-rides.html" class="nav-link">Luxury Ride</a></li>
                <li><a href="properties.html" class="nav-link">Real Estate</a></li>
            </ul>
            
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
                <a href="login.html" class="btn btn-primary btn-sm auth-link">
                    <i class="fas fa-user"></i> Login
                </a>
            </div>
        </div>
    </nav>

    <!-- Autoparts Page -->
    <div class="dashboard-page">
        <div class="dashboard-header">
            <div class="container">
                <h1><i class="fas fa-cogs"></i> Autoparts Store</h1>
                <p>Quality engine parts and accessories for all vehicle makes</p>
            </div>
        </div>
        
        <div class="container">
            <!-- Search and Filter -->
            <div class="products-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="search-input" placeholder="Search parts...">
                </div>
                <select id="category-filter" class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="Brakes">Brakes</option>
                    <option value="Oils">Oils</option>
                    <option value="Filters">Filters</option>
                    <option value="Ignition">Ignition</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Suspension">Suspension</option>
                </select>
            </div>
            
            <!-- Products Grid -->
            <div class="products-grid" id="products-grid">
                <!-- Products will be loaded dynamically -->
            </div>
            
            <!-- No Results -->
            <div id="no-results" style="display: none; text-align: center; padding: 60px 20px;">
                <i class="fas fa-search" style="font-size: 4rem; color: var(--primary-gold); opacity: 0.5; margin-bottom: 20px;"></i>
                <h3>No products found</h3>
                <p style="color: var(--text-muted);">Try adjusting your search or filter</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Pamtech Automobile. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
    
    <!-- Autoparts Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadProducts();
            
            // Search functionality
            const searchInput = document.getElementById('search-input');
            searchInput.addEventListener('input', Pamtech.Utils.debounce(() => {
                loadProducts();
            }, 300));
            
            // Category filter
            const categoryFilter = document.getElementById('category-filter');
            categoryFilter.addEventListener('change', () => {
                loadProducts();
            });
        });
        
        function loadProducts() {
            const searchQuery = document.getElementById('search-input').value;
            const category = document.getElementById('category-filter').value;
            
            let products = Pamtech.Products.getAll();
            
            // Apply search
            if (searchQuery) {
                products = products.filter(p => 
                    p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    p.description.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }
            
            // Apply category filter
            if (category && category !== 'all') {
                products = products.filter(p => p.category === category);
            }
            
            const productsGrid = document.getElementById('products-grid');
            const noResults = document.getElementById('no-results');
            
            if (products.length === 0) {
                productsGrid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            
            productsGrid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image">
                    <div class="product-info">
                        <span class="badge badge-gold" style="margin-bottom: 8px; display: inline-block;">${product.category}</span>
                        <h3 class="product-name">${product.name}</h3>
                        <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 12px; line-height: 1.5;">${product.description}</p>
                        <div class="product-price">${Pamtech.Utils.formatCurrency(product.price)}</div>
                        <div class="product-actions">
                            <button class="btn btn-primary btn-sm" onclick="addToCart(${product.id})" style="flex: 1;">
                                <i class="fas fa-cart-plus"></i> Add to Cart
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function addToCart(productId) {
            const product = Pamtech.Products.getById(productId);
            if (product) {
                Pamtech.Cart.addItem(product);
            }
        }
    </script>
</body>
</html>
