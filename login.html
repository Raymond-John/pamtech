<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pamtech Automobile</title>
    <meta name="description" content="Login to your Pamtech Automobile account.">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-car"></i>
                </div>
                <span class="logo-text">Pam<span>tech</span></span>
            </a>
            
            <div class="nav-actions">
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-count" style="display: none;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Login Page -->
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <div class="logo-icon">
                        <i class="fas fa-car"></i>
                    </div>
                    <span class="logo-text">Pam<span>tech</span></span>
                </a>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to access your account</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-envelope" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="email" id="email" class="form-input" style="border: none; flex: 1;" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="form-input" style="display: flex; align-items: center; padding: 0;">
                        <i class="fas fa-lock" style="padding: 0 18px; color: var(--text-muted);"></i>
                        <input type="password" id="password" class="form-input" style="border: none; flex: 1;" placeholder="Enter your password" required>
                        <button type="button" id="toggle-password" style="background: none; border: none; color: var(--text-muted); padding: 0 18px; cursor: pointer;">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-muted); font-size: 0.875rem;">
                        <input type="checkbox" style="width: 16px; height: 16px;">
                        Remember me
                    </label>
                    <a href="#" style="color: var(--primary-gold); font-size: 0.875rem;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>
            
            <!-- Admin Login Link -->
            <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.1);">
                <a href="#" id="admin-login-link" style="color: var(--text-muted); font-size: 0.875rem;">
                    <i class="fas fa-user-shield"></i> Admin Login
                </a>
            </div>
            
            <!-- Admin Login Form (Hidden) -->
            <form id="admin-login-form" style="display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.1);">
                <h3 style="text-align: center; margin-bottom: 20px; color: var(--primary-gold);">Admin Login</h3>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="admin-username" class="form-input" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="admin-password" class="form-input" placeholder="admin123" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-user-shield"></i> Admin Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
    
    <!-- Login Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            if (Pamtech.Auth.isLoggedIn()) {
                const user = Pamtech.Auth.getCurrentUser();
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
                return;
            }
            
            // Toggle password visibility
            const togglePassword = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                togglePassword.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            // User login form
            const loginForm = document.getElementById('login-form');
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                const result = Pamtech.Auth.login(email, password);
                
                if (result.success) {
                    Pamtech.showNotification(result.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    Pamtech.showNotification(result.message, 'error');
                }
            });
            
            // Admin login toggle
            const adminLoginLink = document.getElementById('admin-login-link');
            const adminLoginForm = document.getElementById('admin-login-form');
            
            adminLoginLink.addEventListener('click', (e) => {
                e.preventDefault();
                adminLoginForm.style.display = adminLoginForm.style.display === 'none' ? 'block' : 'none';
            });
            
            // Admin login form
            adminLoginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const username = document.getElementById('admin-username').value;
                const password = document.getElementById('admin-password').value;
                
                const result = Pamtech.Auth.adminLogin(username, password);
                
                if (result.success) {
                    Pamtech.showNotification(result.message, 'success');
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                } else {
                    Pamtech.showNotification(result.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
